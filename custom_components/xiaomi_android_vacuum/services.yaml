start_zone:
  name: Start a zone cleanup
  description: >-
    Start one named safe routine, or one or two rectangles drawn against a fresh
        map preview. Every zone, including named routines, is tied to a fresh
        preview generation. Rectangles use normalized coordinates from 0 through 10000.
  target:
    entity:
      integration: xiaomi_android_vacuum
      domain: vacuum
  fields:
    zone_name:
      name: Named zone
      description: A named, gateway-allowlisted routine such as litter_box.
      required: false
      selector:
        text:
    rectangles:
      name: Normalized rectangles
      description: >-
        One or two rectangles with x1, y1, x2 and y2 in the range 0..10000.
        A fresh map_generation is required by the gateway for every zone.
      required: false
      example:
        - x1: 1800
          y1: 5700
          x2: 5000
          y2: 7000
      selector:
        object:
    map_generation:
      name: Map generation
      description: The fresh generation returned by refresh_map or shown on the vacuum entity.
      required: false
      selector:
        text:
    dry_run:
      name: Dry run
      description: Validate the named routine or rectangle without starting the robot.
      default: false
      selector:
        boolean:
    idempotency_key:
      name: Idempotency key
      description: A stable key is generated when omitted so a retry returns the original job.
      required: false
      selector:
        text:

refresh_map:
  name: Refresh the vacuum map
  description: >-
    Capture a new Xiaomi Home map preview when the dedicated Android phone is
    idle. This is explicit so normal status polling never steals the phone.
  target:
    entity:
      integration: xiaomi_android_vacuum
      domain: vacuum
